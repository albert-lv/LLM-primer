name: papers enrich

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm enrich
      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: chore: enrich paper metadata
          title: chore: enrich paper metadata
          body: Automated weekly paper metadata enrichment.
          branch: automation/papers-enrich
