<?xml version="1.0" encoding="UTF-8"?>
<svg width="2400" height="1200" viewBox="0 0 2400 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    
    <!-- Mountain gradient 1 -->
    <linearGradient id="mountain1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a6f"/>
    </linearGradient>
    
    <!-- Mountain gradient 2 -->
    <linearGradient id="mountain2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#feca57"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    
    <!-- Mountain gradient 3 -->
    <linearGradient id="mountain3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48dbfb"/>
      <stop offset="100%" style="stop-color:#0abde3"/>
    </linearGradient>
    
    <!-- Mountain gradient 4 -->
    <linearGradient id="mountain4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1dd1a1"/>
      <stop offset="100%" style="stop-color:#10ac84"/>
    </linearGradient>
    
    <!-- Mountain gradient 5 -->
    <linearGradient id="mountain5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5f27cd"/>
      <stop offset="100%" style="stop-color:#341f97"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Star glow -->
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Sky background -->
  <rect width="2400" height="1200" fill="url(#skyGradient)"/>
  
  <!-- Stars -->
  <g id="stars" filter="url(#starGlow)">
    <circle cx="100" cy="150" r="2" fill="white" opacity="0.8"/>
    <circle cx="300" cy="80" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="500" cy="200" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="700" cy="100" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="900" cy="180" r="2" fill="white" opacity="0.8"/>
    <circle cx="1100" cy="60" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="1300" cy="220" r="2.2" fill="white" opacity="0.85"/>
    <circle cx="1500" cy="90" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="1700" cy="160" r="2" fill="white" opacity="0.8"/>
    <circle cx="1900" cy="70" r="1.5" fill="white" opacity="0.65"/>
    <circle cx="2100" cy="190" r="2.3" fill="white" opacity="0.9"/>
    <circle cx="2300" cy="110" r="1.7" fill="white" opacity="0.75"/>
  </g>
  
  <!-- Mountains representing transformer layers -->
  <g id="mountains">
    <!-- Mountain 1 - Self-Attention Layer 1 -->
    <path d="M 0 1200 L 200 650 L 400 900 L 600 700 L 800 950 L 1000 750 L 1200 900 L 1400 700 L 1600 950 L 1800 750 L 2000 900 L 2200 700 L 2400 850 L 2400 1200 Z" 
          fill="url(#mountain1)" opacity="0.95" filter="url(#glow)"/>
    <text x="1200" y="700" text-anchor="middle" fill="white" font-size="24" font-weight="bold" filter="url(#glow)">Self-Attention Layer 1</text>
    
    <!-- Mountain 2 - Self-Attention Layer 2 -->
    <path d="M 0 1200 L 150 800 L 350 1000 L 550 850 L 750 1050 L 950 875 L 1150 1025 L 1350 825 L 1550 975 L 1750 800 L 1950 950 L 2150 775 L 2350 925 L 2400 875 L 2400 1200 Z" 
          fill="url(#mountain2)" opacity="0.9" filter="url(#glow)"/>
    <text x="1200" y="825" text-anchor="middle" fill="white" font-size="24" font-weight="bold" filter="url(#glow)">Self-Attention Layer 2</text>
    
    <!-- Mountain 3 - Cross-Attention Layer -->
    <path d="M 0 1200 L 250 900 L 450 1050 L 650 925 L 850 1075 L 1050 950 L 1250 1100 L 1450 975 L 1650 1125 L 1850 1000 L 2050 1150 L 2250 1025 L 2400 950 L 2400 1200 Z" 
          fill="url(#mountain3)" opacity="0.85" filter="url(#glow)"/>
    <text x="1200" y="950" text-anchor="middle" fill="white" font-size="24" font-weight="bold" filter="url(#glow)">Cross-Attention Layer</text>
    
    <!-- Mountain 4 - Feed-Forward Layer -->
    <path d="M 0 1200 L 100 1000 L 300 1100 L 500 1025 L 700 1125 L 900 1050 L 1100 1150 L 1300 1075 L 1500 1175 L 1700 1100 L 1900 1200 L 2100 1125 L 2300 1075 L 2400 1150 L 2400 1200 Z" 
          fill="url(#mountain4)" opacity="0.8" filter="url(#glow)"/>
    <text x="1200" y="1075" text-anchor="middle" fill="white" font-size="24" font-weight="bold" filter="url(#glow)">Feed-Forward Layer</text>
    
    <!-- Mountain 5 - Output Layer -->
    <path d="M 0 1200 L 200 1100 L 400 1150 L 600 1075 L 800 1175 L 1000 1100 L 1200 1200 L 1400 1125 L 1600 1200 L 1800 1150 L 2000 1075 L 2200 1150 L 2400 1100 L 2400 1200 Z" 
          fill="url(#mountain5)" opacity="0.75" filter="url(#glow)"/>
    <text x="1200" y="1125" text-anchor="middle" fill="white" font-size="24" font-weight="bold" filter="url(#glow)">Output Layer</text>
  </g>
  
  <!-- Title -->
  <text x="1200" y="150" text-anchor="middle" fill="white" font-size="72" font-weight="bold" filter="url(#glow)">LLM Primer</text>
  <text x="1200" y="220" text-anchor="middle" fill="white" font-size="32" opacity="0.9">Transformer Architecture Landscape</text>
  
  <!-- Legend -->
  <g transform="translate(50, 1050)" opacity="0.9">
    <rect width="350" height="130" fill="rgba(0,0,0,0.5)" rx="10" stroke="white" stroke-width="1"/>
    <text x="20" y="30" fill="white" font-size="18" font-weight="bold">Layer Types</text>
    <rect x="20" y="45" width="15" height="15" fill="#ff6b6b" rx="3"/><text x="45" y="57" fill="white" font-size="14">Self-Attention</text>
    <rect x="20" y="65" width="15" height="15" fill="#feca57" rx="3"/><text x="45" y="77" fill="white" font-size="14">Cross-Attention</text>
    <rect x="20" y="85" width="15" height="15" fill="#48dbfb" rx="3"/><text x="45" y="97" fill="white" font-size="14">Feed-Forward</text>
    <rect x="180" y="45" width="15" height="15" fill="#1dd1a1" rx="3"/><text x="205" y="57" fill="white" font-size="14">Output</text>
  </g>
</svg>