tldr_zh: 'Anthropic 的 Constitutional AI（CAI）方法：用一组明文"宪法"原则，让模型先进行自我批评和

  修订（SL-CAI 阶段），再用 AI 反馈代替人类反馈做 RLHF（RLAIF 阶段）。

  这减少了对人工标注的依赖，是 Claude 系列模型对齐的核心技术。

  '
tldr_en: 'Anthropic''s Constitutional AI (CAI): use a set of explicit "constitution" principles to

  let the model self-critique and revise (SL-CAI phase), then use AI feedback instead of

  human feedback for RLHF (RLAIF phase). This reduces reliance on human annotation and is

  the core alignment technique behind the Claude model family.

  '
