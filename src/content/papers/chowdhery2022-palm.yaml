tldr_zh: Google 的 540B 参数 PaLM 模型，展示了 Pathways 系统上的大规模训练。论文详细记录了训练稳定性技术、数据混合策略和涌现能力观察，是大模型预训练工程的重要参考。
tldr_en: Google's 540B parameter PaLM model trained on the Pathways system. The paper details training stability
  techniques, data mixture strategies, and observations of emergent capabilities, serving as an important reference for
  large-model pretraining engineering.
