tldr_zh: '阿里通义千问首份完整技术报告，覆盖 1.8B–72B 全尺寸，并强调中英双语 + tokenizer 友好度。是中文开源 LLM 系列的代表性奠基；后续 Qwen2/2.5 是 2024-2025 开源 SOTA。

  '
tldr_en: 'Alibaba Qwen''s first complete technical report, covering 1.8B-72B full range, emphasizing Chinese-English bilingual + tokenizer friendliness. Representative foundation for Chinese open-source LLM series; subsequent Qwen2/2.5 are 2024-2025 open-source SOTA.

  '
